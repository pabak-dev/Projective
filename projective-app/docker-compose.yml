version: "3.8"
services:
    # Laravel App Service
    laravel_app:
        build:
            context: .
            dockerfile: Dockerfile
        image: pabak/laravel-app
        container_name: laravel_app
        restart: unless-stopped
        working_dir: /var/www/html
        volumes:
            - ./:/var/www/html
        networks:
            - laravel

    # Nginx Service
    nginx:
        image: nginx:alpine
        container_name: laravel_nginx
        restart: unless-stopped
        ports:
            - "8000:80"
        volumes:
            - ./:/var/www/html
            - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
        networks:
            - laravel

# Docker Networks
networks:
    laravel:
        driver: bridge
